<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Joe AI Studio{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root {
    --p: #6366f1;
    --bd: #12121a;
    --bi: #1a1a24;
    --tp: #fff;
    --ts: #a1a1aa;
    --br: #27272a;
}
body {
    font-family: sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100vh;
}
.navbar {
    background: rgba(10, 10, 15, 0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #27272a;
}
.btn-p {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    border: none;
    color: #fff;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
}
.btn-p:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
}
.main {
    padding-top: 80px;
}
.hero {
    padding: 6rem 0;
    text-align: center;
}
.stat {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.chat-container {
    background: #12121a;
    border: 1px solid #27272a;
    border-radius: 16px;
    overflow: hidden;
}
.msg {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.msg.user {
    flex-direction: row-reverse;
}
.avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.msg.ai .avatar {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
}
.msg.user .avatar {
    background: #1a1a24;
}
.content {
    max-width: 75%;
    padding: 1rem 1.25rem;
    border-radius: 12px;
}
.msg.ai .content {
    background: #1a1a24;
    border: 1px solid #27272a;
}
.msg.user .content {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff;
}
.input-field {
    background: #1a1a24;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 0.875rem 1rem;
    color: #fff;
    resize: none;
}
.input-field:focus {
    border-color: #6366f1;
    box-shadow: none;
}
.card {
    background: #12121a;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 1.5rem;
}
.card:hover {
    border-color: #6366f1;
    transform: translateY(-4px);
}
.badge-custom {
    background: rgba(16, 185, 129, 0.1);
    color: #10b981;
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
}
.icon-box {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    font-size: 1.5rem;
    color: #fff;
}
.typing-indicator span {
    width: 8px;
    height: 8px;
    background: #a1a1aa;
    border-radius: 50%;
    animation: typing 1.4s infinite;
    display: inline-block;
}
.typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
}
.typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
}
@keyframes typing {
    0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
    }
    30% {
        transform: translateY(-4px);
        opacity: 1;
    }
}
@media (max-width: 768px) {
    .content {
        max-width: 90%;
    }
}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center" href="/">
            <span style="width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-right:0.5rem">
                <i class="bi bi-robot text-white"></i>
            </span>
            Joe AI Studio
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <i class="bi bi-list text-white fs-3"></i>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto me-3">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                        <i class="bi bi-house-door me-1"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/chat' %}active{% endif %}" href="/chat">
                        <i class="bi bi-chat-dots me-1"></i> Chat
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/docs' %}active{% endif %}" href="/docs">
                        <i class="bi bi-book me-1"></i> Docs
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">
                        <i class="bi bi-info-circle me-1"></i> About
                    </a>
                </li>
            </ul>
            <a href="/chat" class="btn btn-p">
                <i class="bi bi-rocket-takeoff me-1"></i> Get Started
            </a>
        </div>
    </div>
</nav>

<main class="main">
    {% block content %}{% endblock %}
</main>

<footer class="text-center py-4" style="border-top: 1px solid #27272a; background: #12121a">
    <p class="text-secondary mb-0">&copy; 2026 <a href="/">Joe AI Studio</a>. Built with OpenRouter.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
